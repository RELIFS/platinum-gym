name: CI

on:
  push:
    branches:
      - rossi
      - luthfi
      - main
  pull_request:

jobs:
  test:
    name: Laravel Test And Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: bcmath, ctype, dom, fileinfo, filter, mbstring, openssl, pdo, pdo_sqlite, tokenizer, xml
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install NPM Dependencies
        run: npm ci

      - name: Prepare Environment
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - name: Validate Composer
        run: composer validate --no-check-publish --no-interaction

      - name: Check PHP Style
        run: vendor/bin/pint --test

      - name: Build Frontend Assets
        run: npm run build

      - name: Run Tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: php artisan test --no-ansi
